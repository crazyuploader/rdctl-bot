<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0d0d0f" />
    <title>rdctl</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%234f98a3' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M13 10V3L4 14h7v7l9-11h-7z'/%3E%3C/svg%3E"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <style>
      .login-theme {
        position: fixed;
        top: var(--space-3);
        right: var(--space-3);
      }
    </style>
  </head>
  <body>
    <button
      id="theme-btn"
      class="icon-btn login-theme"
      aria-label="Toggle theme"
    ></button>

    <div class="login-wrap fade-in">
      <div class="login-card">
        <div class="login-logo">rd<span>ctl</span></div>
        <p class="login-sub">Real-Debrid Controller</p>
        <form id="login-form" novalidate>
          <label for="api-key-input" style="display: none">API Key</label>
          <input
            type="password"
            id="api-key-input"
            class="input"
            placeholder="Enter API key…"
            autocomplete="current-password"
            spellcheck="false"
            autofocus
          />
          <button
            type="submit"
            id="login-btn"
            class="btn btn-teal login-submit"
          >
            Sign in
          </button>
        </form>
      </div>
    </div>

    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="app.js"></script>
    <script>
      (function () {
        App.initTheme();

        if (
          localStorage.getItem("authToken") ||
          localStorage.getItem("apiKey")
        ) {
          window.location.replace("/dashboard");
          return;
        }

        var params = new URLSearchParams(window.location.search);
        var code = params.get("code");
        if (code) {
          exchangeCode(code);
        } else {
          document
            .getElementById("login-form")
            .addEventListener("submit", handleLogin);
        }

        async function handleLogin(e) {
          e.preventDefault();
          var input = document.getElementById("api-key-input");
          var btn = document.getElementById("login-btn");
          var key = input.value.trim();
          if (!key) return;
          btn.disabled = true;
          btn.textContent = "Signing in…";
          try {
            var res = await fetch("/api/auth/me", {
              headers: { "X-API-Key": key },
            });
            if (!res.ok) throw new Error("bad key");
            localStorage.setItem("apiKey", key);
            window.location.replace("/dashboard");
          } catch (_) {
            App.showToast("Invalid API key — check and try again", "error");
            input.value = "";
            input.focus();
            btn.disabled = false;
            btn.textContent = "Sign in";
          }
        }

        async function exchangeCode(code) {
          try {
            var res = await fetch("/api/exchange-token", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ code: code }),
            });
            if (res.ok) {
              var data = await res.json();
              if (data && data.token) {
                localStorage.setItem("authToken", data.token);
                history.replaceState(null, "", "/");
                window.location.replace("/dashboard");
                return;
              }
            }
          } catch (_) {}
          App.showToast("Link expired — enter your API key instead", "error");
          document
            .getElementById("login-form")
            .addEventListener("submit", handleLogin);
        }
      })();
    </script>
  </body>
</html>
