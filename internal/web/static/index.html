<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rdctl Bot</title>
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%233b82f6' stroke-width='2'%3E%3Cpath d='M13 10V3L4 14h7v7l9-11h-7z'/%3E%3C/svg%3E"
    />
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              bg: "#0a0a0b",
              surface: "#141416",
              border: "#27272a",
              muted: "#71717a",
            },
            fontFamily: {
              sans: ["Inter", "system-ui", "sans-serif"],
            },
          },
        },
      };
    </script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap");

      * {
        box-sizing: border-box;
      }

      body {
        background: #0a0a0b;
        color: #fafafa;
        font-family: "Inter", system-ui, sans-serif;
        min-height: 100vh;
      }

      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: #3f3f46;
        border-radius: 3px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #52525b;
      }

      .card {
        background: #141416;
        border: 1px solid #27272a;
        border-radius: 12px;
        transition: border-color 0.2s;
      }
      .card:hover {
        border-color: #3f3f46;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 8px 16px;
        border-radius: 8px;
        font-weight: 500;
        font-size: 14px;
        transition: all 0.15s;
        cursor: pointer;
        border: none;
      }
      .btn-primary {
        background: #2563eb;
        color: white;
      }
      .btn-primary:hover {
        background: #1d4ed8;
      }

      .btn-ghost {
        background: transparent;
        color: #a1a1aa;
      }
      .btn-ghost:hover {
        background: #27272a;
        color: #fafafa;
      }

      .btn-danger {
        background: #dc2626;
        color: white;
      }
      .btn-danger:hover {
        background: #b91c1c;
      }

      .input {
        background: #0a0a0b;
        border: 1px solid #27272a;
        border-radius: 8px;
        padding: 10px 14px;
        color: #fafafa;
        font-size: 14px;
        width: 100%;
        transition: border-color 0.15s;
      }
      .input:focus {
        outline: none;
        border-color: #3b82f6;
      }
      .input::placeholder {
        color: #52525b;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 8px;
        border-radius: 9999px;
        font-size: 11px;
        font-weight: 500;
        text-transform: uppercase;
      }
      .badge-success {
        background: #16653420;
        color: #4ade80;
      }
      .badge-warning {
        background: #ca8a0420;
        color: #facc15;
      }
      .badge-error {
        background: #dc262620;
        color: #f87171;
      }
      .badge-info {
        background: #2563eb20;
        color: #60a5fa;
      }
      .badge-muted {
        background: #27272a;
        color: #a1a1aa;
      }

      .torrent-item {
        padding: 12px 16px;
        border-bottom: 1px solid #27272a;
        transition: background 0.1s;
      }
      .torrent-item:last-child {
        border-bottom: none;
      }
      .torrent-item:hover {
        background: #1c1c1e;
      }
      .torrent-item.kept {
        border-left: 3px solid #3b82f6;
      }

      .progress-bar {
        height: 4px;
        background: #27272a;
        border-radius: 2px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: #3b82f6;
        border-radius: 2px;
        transition: width 0.3s;
      }
      .progress-fill.complete {
        background: #22c55e;
      }

      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.8);
        backdrop-filter: blur(4px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 50;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s;
      }
      .modal-overlay.show {
        opacity: 1;
        pointer-events: auto;
      }
      .modal {
        background: #141416;
        border: 1px solid #27272a;
        border-radius: 16px;
        padding: 24px;
        max-width: 400px;
        width: 90%;
        transform: scale(0.95);
        transition: transform 0.2s;
      }
      .modal-overlay.show .modal {
        transform: scale(1);
      }

      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translateX(-50%) translateY(100px);
        background: #141416;
        border: 1px solid #27272a;
        border-radius: 12px;
        padding: 12px 20px;
        font-size: 14px;
        z-index: 100;
        opacity: 0;
        transition: all 0.3s;
      }
      .toast.show {
        transform: translateX(-50%) translateY(0);
        opacity: 1;
      }
      .toast.error {
        border-color: #dc2626;
      }
      .toast.success {
        border-color: #22c55e;
      }

      .tab {
        padding: 8px 16px;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        color: #71717a;
        cursor: pointer;
        transition: all 0.15s;
      }
      .tab:hover {
        color: #a1a1aa;
        background: #1c1c1e;
      }
      .tab.active {
        color: #fafafa;
        background: #27272a;
      }

      .skeleton {
        background: linear-gradient(
          90deg,
          #1c1c1e 25%,
          #27272a 50%,
          #1c1c1e 75%
        );
        background-size: 200% 100%;
        animation: shimmer 1.5s infinite;
        border-radius: 4px;
      }
      @keyframes shimmer {
        0% {
          background-position: 200% 0;
        }
        100% {
          background-position: -200% 0;
        }
      }

      @media (max-width: 640px) {
        .hide-mobile {
          display: none !important;
        }
      }
    </style>
  </head>
  <body class="antialiased">
    <!-- Login Screen -->
    <div
      id="login-screen"
      class="min-h-screen flex items-center justify-center p-4"
    >
      <div class="w-full max-w-sm">
        <div class="text-center mb-8">
          <h1 class="text-2xl font-semibold mb-1">Rdctl Bot</h1>
          <p class="text-[#71717a] text-sm">Enter your API key to continue</p>
        </div>
        <form id="login-form" class="space-y-4">
          <input
            type="password"
            id="api-key-input"
            class="input"
            placeholder="API Key"
            required
            autofocus
          />
          <button type="submit" class="btn btn-primary w-full py-3">
            Sign In
          </button>
        </form>
      </div>
    </div>

    <!-- Main App -->
    <div id="app-screen" class="hidden min-h-screen">
      <!-- Header -->
      <header
        class="sticky top-0 z-40 bg-[#0a0a0b]/90 backdrop-blur-lg border-b border-[#27272a]"
      >
        <div
          class="max-w-4xl mx-auto px-4 py-3 flex items-center justify-between"
        >
          <div class="flex items-center gap-3">
            <span
              id="user-greeting"
              class="text-sm text-[#71717a] hide-mobile"
            ></span>
          </div>
          <div class="flex items-center gap-2">
            <span id="status-badge" class="badge badge-muted">
              <i data-lucide="loader-2" class="w-3 h-3 animate-spin"></i>
              <span>Connecting</span>
            </span>
            <button id="logout-btn" class="btn btn-ghost p-2" title="Logout">
              <i data-lucide="log-out" class="w-4 h-4"></i>
            </button>
          </div>
        </div>
      </header>

      <!-- Content -->
      <main class="max-w-4xl mx-auto px-4 py-6 space-y-6">
        <!-- Quick Actions -->
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-3">
          <form id="add-torrent-form" class="card p-4">
            <div class="flex items-center gap-2 mb-3">
              <i data-lucide="download" class="w-4 h-4 text-blue-400"></i>
              <span class="text-sm font-medium">Add Torrent</span>
            </div>
            <div class="flex gap-2">
              <input
                type="text"
                id="magnet-link"
                class="input flex-1"
                placeholder="magnet:?xt=urn:btih:..."
              />
              <button type="submit" class="btn btn-primary">
                <i data-lucide="plus" class="w-4 h-4"></i>
                <span class="hide-mobile">Add</span>
              </button>
            </div>
          </form>

          <form id="unrestrict-form" class="card p-4">
            <div class="flex items-center gap-2 mb-3">
              <i data-lucide="unlock" class="w-4 h-4 text-purple-400"></i>
              <span class="text-sm font-medium">Unrestrict Link</span>
            </div>
            <div class="flex gap-2">
              <input
                type="text"
                id="hoster-link"
                class="input flex-1"
                placeholder="https://host.com/file"
              />
              <button
                type="submit"
                class="btn btn-primary"
                style="background: #9333ea"
              >
                <i data-lucide="key" class="w-4 h-4"></i>
                <span class="hide-mobile">Unlock</span>
              </button>
            </div>
          </form>
        </div>

        <!-- Auto Delete Settings (Admin Only) -->
        <div id="autodelete-card" class="card p-4 hidden">
          <div class="flex items-center justify-between">
            <div class="flex items-center gap-2">
              <i data-lucide="clock" class="w-4 h-4 text-[#a1a1aa]"></i>
              <span class="text-sm font-medium">Auto-delete</span>
            </div>
            <div class="flex items-center gap-2">
              <span id="autodelete-value" class="text-sm text-[#71717a]"
                >-- days</span
              >
              <input
                type="number"
                id="autodelete-input"
                class="input w-20 py-1.5 text-center text-sm"
                min="0"
                placeholder="0"
              />
              <button id="autodelete-save" class="btn btn-ghost text-sm py-1.5">
                Save
              </button>
            </div>
          </div>
        </div>

        <!-- Tabs -->
        <div
          class="flex items-center gap-1 border-b border-[#27272a] pb-px -mx-4 px-4"
        >
          <button class="tab active" data-tab="torrents">
            <span class="flex items-center gap-2">
              <i data-lucide="file-down" class="w-4 h-4"></i>
              Torrents
            </span>
          </button>
          <button class="tab" data-tab="downloads">
            <span class="flex items-center gap-2">
              <i data-lucide="package" class="w-4 h-4"></i>
              Downloads
            </span>
          </button>
        </div>

        <!-- Torrents List -->
        <div id="torrents-panel" class="card overflow-hidden">
          <div
            class="p-3 border-b border-[#27272a] flex items-center justify-between gap-3"
          >
            <div class="flex items-center gap-2">
              <input
                type="text"
                id="torrents-search"
                class="input w-48 text-sm py-2"
                placeholder="Search..."
              />
            </div>
            <div class="flex items-center gap-2">
              <label
                class="flex items-center gap-2 text-xs text-[#71717a] cursor-pointer"
              >
                <input
                  type="checkbox"
                  id="auto-refresh-torrents"
                  class="accent-blue-600"
                  checked
                />
                Auto-refresh
              </label>
              <button
                id="refresh-torrents"
                class="btn btn-ghost p-2"
                title="Refresh"
              >
                <i data-lucide="refresh-cw" class="w-4 h-4"></i>
              </button>
            </div>
          </div>
          <div id="torrents-list" class="max-h-[500px] overflow-y-auto">
            <!-- Empty state -->
            <div id="torrents-empty" class="py-16 text-center">
              <i
                data-lucide="inbox"
                class="w-12 h-12 mx-auto mb-3 text-[#3f3f46]"
              ></i>
              <p class="text-[#71717a]">No torrents yet</p>
            </div>
            <!-- Skeleton -->
            <div id="torrents-loading" class="hidden p-4 space-y-3">
              <div class="skeleton h-16"></div>
              <div class="skeleton h-16"></div>
              <div class="skeleton h-16"></div>
            </div>
          </div>
        </div>

        <!-- Downloads List -->
        <div id="downloads-panel" class="card overflow-hidden hidden">
          <div
            class="p-3 border-b border-[#27272a] flex items-center justify-between gap-3"
          >
            <input
              type="text"
              id="downloads-search"
              class="input w-48 text-sm py-2"
              placeholder="Search..."
            />
            <div class="flex items-center gap-2">
              <label
                class="flex items-center gap-2 text-xs text-[#71717a] cursor-pointer"
              >
                <input
                  type="checkbox"
                  id="auto-refresh-downloads"
                  class="accent-blue-600"
                  checked
                />
                Auto-refresh
              </label>
              <button
                id="refresh-downloads"
                class="btn btn-ghost p-2"
                title="Refresh"
              >
                <i data-lucide="refresh-cw" class="w-4 h-4"></i>
              </button>
            </div>
          </div>
          <div id="downloads-list" class="max-h-[500px] overflow-y-auto">
            <!-- Empty state -->
            <div id="downloads-empty" class="py-16 text-center">
              <i
                data-lucide="package"
                class="w-12 h-12 mx-auto mb-3 text-[#3f3f46]"
              ></i>
              <p class="text-[#71717a]">No downloads yet</p>
            </div>
            <div id="downloads-loading" class="hidden p-4 space-y-3">
              <div class="skeleton h-16"></div>
              <div class="skeleton h-16"></div>
            </div>
          </div>
        </div>
      </main>
    </div>

    <!-- Confirm Modal -->
    <div id="confirm-modal" class="modal-overlay">
      <div class="modal">
        <h3 id="confirm-title" class="text-lg font-semibold mb-2">Confirm</h3>
        <p id="confirm-message" class="text-[#a1a1aa] text-sm mb-6 break-all"></p>
        <div class="flex justify-end gap-3">
          <button id="confirm-cancel" class="btn btn-ghost">Cancel</button>
          <button id="confirm-ok" class="btn btn-danger">Delete</button>
        </div>
      </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
  </body>
</html>
