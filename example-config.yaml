# Telegram Bot Configuration
telegram:
  bot_token: "YOUR_TELEGRAM_BOT_TOKEN"

  # List of allowed chat IDs (users or groups)
  allowed_chat_ids:
    - 123456789
    - 987654321

  # Optional: Restrict bot to specific topics in group chats
  # Map of chat_id to list of allowed topic IDs. If not set or empty for a chat, all topics are allowed.
  # Example (bot will only respond in topic 5 and 10 of chat -1001706698345):
  # allowed_topic_ids:
  #   -1001706698345:
  #     - 5
  #     - 10

  # Super admin chat IDs (full access)
  super_admin_ids:
    - 123456789

# Real-Debrid API Configuration
realdebrid:
  api_token: "YOUR_REAL_DEBRID_API_TOKEN"
  base_url: "https://api.real-debrid.com/rest/1.0"
  timeout: 30 # seconds
  proxy: "" # Optional: HTTP/SOCKS5 proxy URL (e.g., "http://localhost:8080" or "socks5://user:pass@host:port")
  ip_test_url: "" # Optional: URL to use for IP testing when a proxy is configured (e.g., "https://api.ipify.org?format=json")
  ip_verify_url: "" # Optional: Second URL to use for IP verification. If provided, the IP from ip_test_url must match this URL's IP.

# Application Settings
app:
  log_level: "info" # debug, info, warn, error
  rate_limit:
    messages_per_second: 25 # Stay under Telegram's 30/s limit
    burst: 5
  max_kept_torrents: 10 # Max kept torrents per non-admin user (0 = unlimited, admins always have unlimited)
  auto_delete_days: 0 # Default auto-delete days fallback when not set in UI/DB (0 = disabled)

database:
  # Database host
  host: "localhost"
  # Database port
  port: 5432
  # Database user
  user: "postgres"
  # Database password
  password: "your_password"
  # Database name
  dbname: "rdctl_bot"
  # SSL mode for database connection (e.g., "disable", "require")
  sslmode: "disable"

web:
  listen_addr: ":8089"
  api_key: "random_key"
  dashboard_url: "http://localhost:8089" # Base URL for dashboard links
  token_expiry_minutes: 60 # Token validity duration
  limiter:
    enabled: true # Recommended: Set to true to enable rate limiting
    max: 20 # Max requests per expiration period (allows for dashboard page loads and auto-refresh)
    expiration_seconds: 1 # Expiration period in seconds

    # Security: IP Banning Settings
    ban_duration_seconds: 3600 # Ban IP for 1 hour after excessive failures
    auth_fail_limit: 10 # Allow 10 failures...
    auth_fail_window: 60 # ...in 60 seconds before banning

  # Prometheus Metrics Configuration
  metrics:
    enabled: true
    user: "admin"
    password: "securepassword"
