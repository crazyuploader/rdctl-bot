name: Version Bump

on:
  workflow_dispatch:
    inputs:
      version_type:
        description: "Version bump type"
        required: true
        default: "minor"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  bump-version:
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.version.outputs.NEW_VERSION }}
      old_version: ${{ steps.version.outputs.OLD_VERSION }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bump version
        id: version
        run: |
          # Get the latest tag
          OLD_VERSION=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")

          # Remove 'v' prefix for processing
          OLD_VERSION_NUM=${OLD_VERSION#v}

          # Split version into components, defaulting PATCH to 0 if empty
          IFS='.' read -r MAJOR MINOR PATCH <<< "${OLD_VERSION_NUM}"
          PATCH=${PATCH:-0}

          # Increment based on type
          case "${{ github.event.inputs.version_type }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"

          echo "OLD_VERSION=${OLD_VERSION}" >> $GITHUB_OUTPUT
          echo "OLD_VERSION_NUM=${OLD_VERSION_NUM}" >> $GITHUB_OUTPUT
          echo "NEW_VERSION=${NEW_VERSION}" >> $GITHUB_OUTPUT

          echo "Old version: $OLD_VERSION"
          echo "New version: $NEW_VERSION"

      - name: Create tag
        run: |
          git tag ${{ steps.version.outputs.NEW_VERSION }}
          git push origin ${{ steps.version.outputs.NEW_VERSION }}

      - name: Create PR for version bump
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump version ${{ steps.version.outputs.OLD_VERSION }} -> ${{ steps.version.outputs.NEW_VERSION }}"
          title: "Release ${{ steps.version.outputs.NEW_VERSION }}"
          body: |
            ## Summary

            Version bump from `${{ steps.version.outputs.OLD_VERSION }}` to `${{ steps.version.outputs.NEW_VERSION }}`

            This PR was created by the Version Bump workflow.

            **Triggered by:** @${{ github.actor }}

            ---
            This PR will trigger a release when merged (via the tag push).
          branch: release/${{ steps.version.outputs.NEW_VERSION }}
          delete-branch: true
          add-labels: release
