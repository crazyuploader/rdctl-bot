name: Go Build & Test

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    permissions:
      contents: read

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build -v ./cmd/rdctl-bot

      - name: Test
        run: go test ./...
