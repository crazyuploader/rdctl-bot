name: Go Build & Test

on:
  push:
  pull_request:
  workflow_call:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    permissions:
      contents: read

    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.2"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: Build
        run: go build -v ./cmd/rdctl-bot

      - name: Test
        run: go test ./...
