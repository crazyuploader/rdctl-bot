version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/db/queries/"
    schema: "internal/db/migrations/"
    gen:
      go:
        package: "db"
        out: "internal/db"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: false
        emit_exact_table_names: true
        emit_pointers_for_null_types: true
        overrides:
          - db_type: "jsonb"
            nullable: false
            go_type: "encoding/json.RawMessage"
          - db_type: "jsonb"
            nullable: true
            go_type: "*encoding/json.RawMessage"
          - db_type: "numeric"
            nullable: false
            go_type: "float64"
          - db_type: "numeric"
            nullable: true
            go_type:
              type: "float64"
              pointer: true
